name: Setup KOL Server (one-time)
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Add KOL deploy key and setup Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /root/.ssh /var/www/kol.foreverdoodle.com
            KOL_PUBKEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPOiyFE9stNohP/8d62ZQ8DsTYRjCfTDZp4uAVA6wH89 kol-deploy@foreverdoodle"
            grep -qF "$KOL_PUBKEY" /root/.ssh/authorized_keys 2>/dev/null || echo "$KOL_PUBKEY" >> /root/.ssh/authorized_keys
            chmod 600 /root/.ssh/authorized_keys
            cat > /etc/nginx/sites-available/kol.foreverdoodle.com << 'NGINXEOF'
            server {
                listen 80;
                server_name kol.foreverdoodle.com;
                root /var/www/kol.foreverdoodle.com;
                index index.html;
                location / { try_files $uri $uri/ /index.html; }
                location ~* \.(js|css|ico|svg|woff2?)$ { expires 30d; add_header Cache-Control "public, immutable"; }
            }
            NGINXEOF
            ln -sf /etc/nginx/sites-available/kol.foreverdoodle.com /etc/nginx/sites-enabled/
            nginx -t && systemctl reload nginx
            echo "✅ KOL server setup complete"
