name: Setup Server (run once)
on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'Admin login password for SEO Dashboard'
        required: true
        type: string
      server_url:
        description: 'Public URL of your server (e.g. http://192.168.10.42)'
        required: true
        default: 'http://192.168.10.42'
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate password hash
        id: hash
        run: |
          HASH=$(node -e "
            const c = require('crypto');
            const h = c.pbkdf2Sync('${{ inputs.admin_password }}', 'seo_dashboard_salt_2024', 100000, 32, 'sha256').toString('base64');
            console.log('pbkdf2:' + h);
          ")
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Setup server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

            echo "=== 1. Check Node.js ==="
            node --version || (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs)

            echo "=== 2. Install PM2 ==="
            npm install -g pm2 2>/dev/null || true
            pm2 --version

            echo "=== 3. Write .env ==="
            cat > $DEPLOY_PATH/.env << ENVEOF
            SERVER_URL=${{ inputs.server_url }}
            VITE_API_BASE=${{ inputs.server_url }}
            GOOGLE_CLIENT_ID=543084749909-v88o8qoea0s1vh3etg1vbhkkm2b572d4.apps.googleusercontent.com
            GOOGLE_CLIENT_SEC=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
            ADMIN_EMAIL=homevirtavo@gmail.com
            ADMIN_PASSWORD_HASH=${{ steps.hash.outputs.hash }}
            API_PORT=3001
            ENVEOF

            echo "=== 4. Start/restart API server ==="
            cd $DEPLOY_PATH/server
            # Pass env vars to PM2
            export SERVER_URL="${{ inputs.server_url }}"
            export GOOGLE_CLIENT_ID="543084749909-v88o8qoea0s1vh3etg1vbhkkm2b572d4.apps.googleusercontent.com"
            export GOOGLE_CLIENT_SEC="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"
            export ADMIN_EMAIL="homevirtavo@gmail.com"
            export ADMIN_PASSWORD_HASH="${{ steps.hash.outputs.hash }}"
            export API_PORT=3001
            pm2 restart seo-api 2>/dev/null || pm2 start index.cjs --name seo-api \
              --env production \
              -e SERVER_URL="${{ inputs.server_url }}" \
              -e GOOGLE_CLIENT_ID="543084749909-v88o8qoea0s1vh3etg1vbhkkm2b572d4.apps.googleusercontent.com" \
              -e GOOGLE_CLIENT_SEC="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" \
              -e ADMIN_EMAIL="homevirtavo@gmail.com" \
              -e ADMIN_PASSWORD_HASH="${{ steps.hash.outputs.hash }}" \
              -e API_PORT=3001
            pm2 save

            echo "=== 5. Check nginx config ==="
            if command -v nginx &> /dev/null; then
              NGINX_CONF="/etc/nginx/sites-enabled/default"
              [ -f /etc/nginx/conf.d/default.conf ] && NGINX_CONF="/etc/nginx/conf.d/default.conf"
              if ! grep -q "proxy_pass.*3001" $NGINX_CONF 2>/dev/null; then
                # Find the server block and add /api/ proxy
                sed -i '/location \/ {/i\    location /api/ {\n        proxy_pass http://127.0.0.1:3001/api/;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n    }\n' $NGINX_CONF
                nginx -t && nginx -s reload
                echo "nginx updated"
              else
                echo "nginx already configured"
              fi
            else
              echo "nginx not found, skip"
            fi

            echo "=== 6. Status ==="
            pm2 list
            curl -s http://127.0.0.1:3001/api/session/test | head -c 100
            echo ""
            echo "=== Setup complete! ==="
