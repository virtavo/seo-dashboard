<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Agent 管理面板 · seo.foreverdoodle.com/agents</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#283041;
    --txt:#e6edf3; --muted:#8b949e; --accent:#3b82f6; --accent2:#2563eb;
    --green:#2ea043; --yellow:#d29922; --red:#da3633; --purple:#a371f7;
    --cyan:#39c5cf; --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;padding-bottom:60px}
  a{color:var(--accent);text-decoration:none}
  code{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:var(--bg);
    border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--cyan)}

  header.topbar{position:sticky;top:0;z-index:30;background:rgba(13,17,23,.85);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:14px 24px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
  .logo .dot{width:10px;height:10px;border-radius:50%;background:var(--green);
    box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.4}}
  .domain{color:var(--muted);font-size:12px;font-family:ui-monospace,Menlo,monospace}
  .topbar .spacer{flex:1}
  .topbar .stat{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .topbar .stat b{font-size:18px}
  .topbar .stat span{font-size:11px;color:var(--muted)}

  .wrap{max-width:1400px;margin:0 auto;padding:24px}

  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px}
  .scard{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
  .scard .label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .scard .num{font-size:28px;font-weight:700;margin-top:6px}
  .scard .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .scard .up{color:var(--green)} .scard .down{color:var(--red)}

  /* global risk banner */
  .riskbar{background:linear-gradient(135deg,rgba(218,54,51,.10),rgba(210,153,34,.08));
    border:1px solid rgba(218,54,51,.35);border-radius:var(--radius);padding:14px 18px;margin-bottom:22px}
  .riskbar h3{font-size:13px;color:#ff7b72;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .riskbar ul{list-style:none;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:6px}
  .riskbar li{font-size:12px;color:var(--txt);display:flex;gap:8px;align-items:flex-start}
  .riskbar li .lv{flex-shrink:0;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px}
  .lv-hi{background:rgba(218,54,51,.2);color:#ff7b72}
  .lv-md{background:rgba(210,153,34,.2);color:#e3b341}
  .lv-ok{background:rgba(46,160,67,.2);color:#56d364}

  .site-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .site-tabs button{background:var(--panel);border:1px solid var(--border);color:var(--muted);
    padding:8px 16px;border-radius:999px;cursor:pointer;font-size:13px;transition:.15s}
  .site-tabs button.active{background:var(--accent2);border-color:var(--accent);color:#fff}
  .site-tabs button:hover{border-color:var(--accent)}

  .site-block{margin-bottom:28px;background:var(--panel);border:1px solid var(--border);
    border-radius:var(--radius);overflow:hidden}
  .site-head{padding:16px 20px;display:flex;align-items:center;gap:14px;
    border-bottom:1px solid var(--border);background:var(--panel2);flex-wrap:wrap}
  .site-head .favgrad{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;
    justify-content:center;font-weight:700;color:#fff;font-size:15px}
  .site-head h2{font-size:16px} .site-head .url{font-size:12px;color:var(--muted);font-family:ui-monospace,monospace}
  .site-head .repo{font-size:11px;color:var(--muted)}
  .site-head .spacer{flex:1}
  .badge{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600}
  .b-run{background:rgba(46,160,67,.15);color:#56d364}
  .b-warn{background:rgba(210,153,34,.15);color:#e3b341}
  .b-idle{background:rgba(139,148,158,.15);color:var(--muted)}

  .seo-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1px;background:var(--border)}
  .seo-cell{background:var(--panel);padding:14px 16px}
  .seo-cell .k{font-size:11px;color:var(--muted)}
  .seo-cell .v{font-size:20px;font-weight:700;margin-top:4px}
  .seo-cell .d{font-size:11px;margin-top:2px}
  .progress{height:6px;background:var(--panel2);border-radius:999px;margin-top:8px;overflow:hidden}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan))}

  /* PM board */
  .pm-board{margin:18px 18px 0;background:linear-gradient(135deg,rgba(247,129,102,.10),rgba(163,113,247,.08));
    border:1px solid rgba(247,129,102,.35);border-radius:10px;padding:16px}
  .pm-board .pm-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .pm-board .ava{width:38px;height:38px;border-radius:9px;background:rgba(247,129,102,.18);
    border:1px solid rgba(247,129,102,.5);display:flex;align-items:center;justify-content:center;font-size:19px}
  .pm-board .pm-name{font-weight:700;font-size:14px}
  .pm-board .pm-sub{font-size:11px;color:var(--muted)}
  .pm-board .spacer{flex:1}
  .pm-board .pm-task{font-size:12px;color:var(--muted);background:var(--bg);border:1px solid var(--border);
    border-radius:7px;padding:8px 10px;margin-bottom:12px}
  .pm-board .pm-task b{color:var(--txt)}
  .plan{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
  .plan .pitem{display:flex;gap:9px;align-items:flex-start;background:var(--panel2);
    border:1px solid var(--border);border-radius:8px;padding:9px 11px}
  .plan .pico{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;
    justify-content:center;font-size:13px;flex-shrink:0}
  .plan .prole{font-size:11px;color:var(--muted)}
  .plan .pwork{font-size:12px;margin-top:1px}
  .pm-ctrls{display:flex;gap:8px;margin-top:14px}
  .pm-ctrls .btn{flex:none;padding:6px 14px}

  .agents{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;padding:18px}
  .agent{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px;
    display:flex;flex-direction:column;gap:10px;transition:.15s}
  .agent:hover{border-color:var(--accent);transform:translateY(-2px)}
  .agent.has-risk{border-color:rgba(218,54,51,.4)}
  .agent .row1{display:flex;align-items:center;gap:10px}
  .agent .ava{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;
    justify-content:center;font-size:17px;flex-shrink:0}
  .agent .nm{font-weight:600;font-size:13px}
  .agent .role{font-size:11px;color:var(--muted)}
  .agent .spacer{flex:1}
  .stled{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .s-running{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.5s infinite}
  .s-idle{background:var(--muted)}
  .s-error{background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse 1s infinite}
  .agent .task{font-size:12px;background:var(--bg);border:1px solid var(--border);
    border-radius:7px;padding:8px 10px;min-height:48px}
  .agent .task .tlabel{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
  .agent .asset{font-size:11px;color:var(--muted);display:flex;gap:5px;align-items:center}
  .agent .risk{font-size:11px;color:#ffb4ad;background:rgba(218,54,51,.12);
    border:1px solid rgba(218,54,51,.3);border-radius:6px;padding:6px 8px;display:flex;gap:6px}
  .agent .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
  .agent .ctrls{display:flex;gap:6px}
  .btn{flex:1;border:1px solid var(--border);background:var(--panel);color:var(--txt);
    border-radius:7px;padding:6px 0;font-size:12px;cursor:pointer;transition:.12s}
  .btn:hover{border-color:var(--accent)}
  .btn-go{background:var(--green);border-color:var(--green);color:#fff}
  .btn-stop{background:transparent;color:var(--yellow);border-color:var(--yellow)}
  .btn-task{background:var(--accent2);border-color:var(--accent);color:#fff}

  .log{padding:0 18px 18px}
  .log h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
    margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .log .feed{background:var(--bg);border:1px solid var(--border);border-radius:8px;
    max-height:160px;overflow-y:auto;font-family:ui-monospace,Menlo,monospace;font-size:12px}
  .log .line{padding:6px 12px;border-bottom:1px solid var(--border);display:flex;gap:10px}
  .log .line:last-child{border:0}
  .log .time{color:var(--muted);flex-shrink:0}
  .log .who{color:var(--cyan);flex-shrink:0;min-width:62px}
  .log .lvl-ok{color:#56d364} .log .lvl-warn{color:#e3b341} .log .lvl-err{color:#ff7b72}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;
    justify-content:center;z-index:50;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    width:100%;max-width:460px;padding:22px}
  .modal h3{margin-bottom:4px}
  .modal p.sub{color:var(--muted);font-size:12px;margin-bottom:16px}
  .modal label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
  .modal textarea,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);
    color:var(--txt);border-radius:8px;padding:10px;font-size:13px;font-family:inherit;resize:vertical}
  .modal .actions{display:flex;gap:10px;margin-top:18px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--green);color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;
    opacity:0;transition:.3s;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .note{font-size:12px;color:var(--muted);text-align:center;margin-top:30px;
    border-top:1px solid var(--border);padding-top:18px}

  /* chat drawer */
  .drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55;display:none}
  .drawer-bg.show{display:block}
  .drawer{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;background:var(--panel);
    border-left:1px solid var(--border);z-index:56;transform:translateX(100%);transition:.28s cubic-bezier(.22,.68,0,1);
    display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(0,0,0,.4)}
  .drawer.show{transform:translateX(0)}
  .dr-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--panel2)}
  .dr-head .ava{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
  .dr-head .nm{font-weight:700;font-size:14px}
  .dr-head .sub{font-size:11px;color:var(--muted)}
  .dr-head .x{margin-left:auto;background:none;border:0;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  .dr-mentions{padding:8px 18px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .chip{background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:2px 9px;cursor:pointer;color:var(--cyan);font-size:11px}
  .chip:hover{border-color:var(--accent)}
  .dr-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:10px}
  .msg{display:flex;gap:9px;max-width:88%}
  .msg .b{padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.5}
  .msg .who{font-size:10px;color:var(--muted);margin-bottom:3px}
  .msg.them{align-self:flex-start}
  .msg.them .b{background:var(--panel2);border:1px solid var(--border);border-top-left-radius:3px}
  .msg.me{align-self:flex-end;flex-direction:row-reverse}
  .msg.me .b{background:var(--accent2);color:#fff;border-top-right-radius:3px}
  .msg.sys{align-self:center;max-width:95%}
  .msg.sys .b{background:rgba(247,129,102,.10);border:1px solid rgba(247,129,102,.3);color:#ffb892;font-size:12px}
  .msg .mava{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
  .dr-input{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--panel2)}
  .dr-input textarea{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:9px;
    padding:9px 11px;font-size:13px;font-family:inherit;resize:none;max-height:90px}
  .dr-send{background:var(--accent2);border:1px solid var(--accent);color:#fff;border-radius:9px;padding:0 16px;cursor:pointer;font-size:13px}
  .btn-chat{background:transparent;color:var(--cyan);border-color:rgba(57,197,207,.4)}

  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<header class="topbar">
  <div class="logo"><span class="dot"></span>SEO Agent 管理面板</div>
  <span class="domain">seo.foreverdoodle.com/agents · GitHub</span>
  <div class="spacer"></div>
  <div class="stat"><b id="kRunning">0</b><span>运行中 Agent</span></div>
  <div class="stat"><b id="kRisks">0</b><span>风险项</span></div>
  <div class="stat"><b id="clock">--:--:--</b><span>系统时间</span></div>
</header>

<div class="wrap">
  <div class="summary" id="summary"></div>
  <div class="riskbar" id="riskbar"></div>
  <div class="site-tabs" id="siteTabs"></div>
  <div id="sites"></div>
  <div class="note" id="note">正在连接 agent 状态接口…</div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>下发任务</h3>
    <p class="sub" id="modalTarget"></p>
    <label>任务类型</label>
    <select id="taskType">
      <option>关键词研究与布局</option>
      <option>页面 Meta / 结构化数据优化</option>
      <option>内链与站点地图重建</option>
      <option>页面性能 / Core Web Vitals 优化</option>
      <option>内容生成与改写</option>
      <option>外链与收录检查</option>
      <option>UI / 视觉改版</option>
      <option>代码审核与上线</option>
      <option>密钥迁移到环境变量（安全）</option>
    </select>
    <label>任务说明</label>
    <textarea id="taskDesc" rows="3" placeholder="描述目标、约束、验收标准…"></textarea>
    <div class="actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-task" onclick="dispatchTask()">下发任务</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- 对话抽屉 -->
<div class="drawer-bg" id="drawerBg" onclick="closeChat()"></div>
<aside class="drawer" id="drawer">
  <div class="dr-head">
    <div class="ava" id="drAva">💬</div>
    <div><div class="nm" id="drName">—</div><div class="sub" id="drSub"></div></div>
    <button class="x" onclick="closeChat()">×</button>
  </div>
  <div class="dr-mentions" id="drMentions"></div>
  <div class="dr-body" id="drBody"></div>
  <div class="dr-input">
    <textarea id="drText" rows="1" placeholder="发消息或派任务，回车发送…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
    <button class="dr-send" onclick="sendChat()">发送</button>
  </div>
</aside>

<script>
/* ---------- 角色 ---------- */
const ROLES = {

  server:  {label:"服务器 / 运维", icon:"🖥️", color:"#ff9f43"},
  reviewer:{label:"审核员", icon:"🔍", color:"#ec6cb9"}

const ST = {running:"运行中", idle:"空闲", error:"异常"};

const AGENT_NAMES = {

  "mysnapvitals.frontend":"Lily","mysnapvitals.backend":"Gus","mysnapvitals.server":"Rex","mysnapvitals.reviewer":"Iris",

  "foreverdoodle.frontend":"Nina","foreverdoodle.backend":"Cyrus","foreverdoodle.server":"Atlas","foreverdoodle.reviewer":"June"

function agentName(siteId, role, a){ return (a && a.name) || AGENT_NAMES[siteId+"."+role] || (ROLES[role]?ROLES[role].label:role); }

/* ---------- 数据（默认演示值，loadData() 会用真实接口覆盖）---------- */
let SITES = [

      {role:"pm", status:"running", task:"统筹 WinEye / MileFlask 产品页与每日博客 SEO 工作", asset:"showmo_automation_agent_instructions.md", progress:55, eta:"持续"},
      {role:"designer", status:"running", task:"产品落地页视觉（深色 + 荧光绿主题、Bento 网格）", asset:"wineye_seo_preview/src/App.tsx", progress:72, eta:"12 分钟",
        risk:"页面图片全部走外部 CDN（cloudfront / skywork），需确认长期可用或本地化"},
      {role:"seo", status:"running", task:"关键词布局 + FAQ / 产品结构化数据", asset:"App.tsx (faqs / compRows)", progress:48, eta:"20 分钟"},
      {role:"dev", status:"running", task:"单页 React 产品详情组件开发", asset:"mileflask_seo_preview/src/App.tsx", progress:60, eta:"15 分钟"},
      {role:"frontend", status:"idle", task:"WinEye 手机端适配（独立静态预览）", asset:"wineye_mobile_preview.html", progress:100, eta:"—"},
      {role:"backend", status:"running", task:"GSC / GA4 / DataForSEO 代理 + AI 洞察（8 个边缘函数）", asset:"supabase/edge_function/", progress:40, eta:"25 分钟",
        risk:"凭据已改为环境变量读取，记得在 Supabase Secrets 配置并轮换旧密钥"},
      {role:"server", status:"running", task:"每日 SEO 博客自动化（GitHub Actions + 生成脚本）", asset:"showmo365-blog/.github/ + scripts/", progress:33, eta:"定时任务"},
      {role:"reviewer", status:"idle", task:'文章质量与"产品页只读"约束核查', asset:"showmo_automation_agent_instructions.md", progress:100, eta:"待触发"}

  },
  {

    seo:{rank:22, rankD:-2, indexed:498, indexedD:+11, traffic:"12.9k", trafficD:-3.2, score:69, issues:9},

function statusBadge(agents){
  const err = agents.some(a=>a.status==="error");
  const run = agents.filter(a=>a.status==="running").length;
  if(err) return `<span class="badge b-warn">需关注</span>`;
  if(run>0) return `<span class="badge b-run">${run} 个运行中</span>`;
  return `<span class="badge b-idle">全部空闲</span>`;
}

function seoRow(s){
  const d=(v,suffix="")=> (v>=0?`<span style="color:#56d364">▲ ${Math.abs(v)}${suffix}</span>`
                                :`<span style="color:#ff7b72">▼ ${Math.abs(v)}${suffix}</span>`);
  return `<div class="seo-row">
    <div class="seo-cell"><div class="k">平均排名</div><div class="v">#${s.rank}</div><div class="d">${d(s.rankD," 位")}</div></div>
    <div class="seo-cell"><div class="k">已收录页面</div><div class="v">${s.indexed}</div><div class="d">${d(s.indexedD)}</div></div>

    <div class="seo-cell"><div class="k">SEO 健康分</div><div class="v">${s.score}<span style="font-size:12px;color:var(--muted)">/100</span></div>
      <div class="progress"><i style="width:${s.score}%"></i></div></div>

}

function toggle(siteId,role){
  const s=SITES.find(x=>x.id===siteId), a=s.agents.find(x=>x.role===role);
  if(a.status==="running"){a.status="idle";a.eta="—";a.progress=100;toast(`已暂停 · ${s.name} / ${ROLES[role].label}`);}
  else{a.status="running";a.progress=15;a.eta="计算中…";toast(`已启动 · ${s.name} / ${ROLES[role].label}`);}
  report('set-status',{site:siteId,role,status:a.status,progress:a.progress,eta:a.eta});
  report('log',{site:siteId,role,level:'ok',message:a.status==='running'?'管理员启动':'管理员暂停'});
  renderAll();
}

function replan(siteId){
  const s=SITES.find(x=>x.id===siteId);
  const pm=s.agents.find(a=>a.role==="pm"); pm.status="running";pm.progress=10;pm.eta="计算中…";
  s.agents.filter(a=>a.role!=="pm").forEach((a,i)=>{
    const pool=PLAN_POOL[a.role]; if(pool) a.task=pool[(i+(Date.now()/1000|0))%pool.length];
    if(a.status==="idle"){a.status="running";a.progress=12;a.eta="计算中…";}
  });
  (LOGS[s.id]=LOGS[s.id]||[]).unshift([nowHM(),"pm","ok",`已重新规划全队，分派 ${s.agents.length-1} 项任务`]);
  renderAll();toast(`PM 已重新规划 · ${s.name}`);
}

  document.getElementById("drSub").textContent=`${s.agents.length} 个 agent 互通协作`;
  document.getElementById("drMentions").innerHTML=`<span>在此广播给全队，可 @ 指定 agent</span>`;
  renderChat(); showDrawer();
}
function curMsgs(){
  if(!chatTarget) return [];
  return chatTarget.channel ? CHANNEL[chatTarget.siteId] : CHAT[chatTarget.siteId][chatTarget.role];
}
function renderChat(){
  const body=document.getElementById("drBody");
  body.innerHTML=curMsgs().map(msgHtml).join("");
  body.scrollTop=body.scrollHeight;
}
function quoteMention(role){
  const nm = chatTarget ? agentName(chatTarget.siteId, role) : (ROLES[role]?ROLES[role].label:role);
  const t=document.getElementById("drText"); t.value=`@${nm} `+t.value; t.focus();
}
function showDrawer(){document.getElementById("drawerBg").classList.add("show");document.getElementById("drawer").classList.add("show");document.getElementById("drText").focus();}
function closeChat(){document.getElementById("drawerBg").classList.remove("show");document.getElementById("drawer").classList.remove("show");chatTarget=null;}

function sendChat(){
  const t=document.getElementById("drText"); const text=t.value.trim(); if(!text||!chatTarget) return;
  const sid=chatTarget.siteId;
  curMsgs().push({from:"me", text, t:nowHM()}); t.value=""; renderChat();
  report('message',{site:sid, role:chatTarget.channel?null:chatTarget.role, channel:!!chatTarget.channel, from_role:'me', body:text});

  if(chatTarget.channel){
    const hit=Object.keys(ROLES).find(r=> text.includes(ROLES[r].label) || text.includes(agentName(sid,r)));
    setTimeout(()=>{ const who=hit||"pm";
      CHANNEL[sid].push({from:who, text:hitReply(who,text), t:nowHM()}); renderChat();
    },650);
    return;
  }
  const role=chatTarget.role, isTask=/优化|修复|重写|生成|部署|检查|做|加|改|上线|审核|分析/.test(text);
  setTimeout(()=>{
    CHAT[sid][role].push({from:role, text: isTask
      ? `收到，我开始处理：「${text}」。完成后我会在团队频道同步。`
      : `好的，${text.length>10?'我记下了，会在当前任务中考虑。':'明白。'}`, t:nowHM()});
    renderChat();
    if(isTask){
      const a=SITES.find(x=>x.id===sid).agents.find(x=>x.role===role);
      a.status="running"; if(a.progress>=100)a.progress=10; a.eta="计算中…";
      report('set-status',{site:sid,role,status:'running',progress:a.progress,eta:a.eta});
      report('log',{site:sid,role,level:'ok',message:`接收管理员任务：${text.slice(0,18)}`});
      (LOGS[sid]=LOGS[sid]||[]).unshift([nowHM(),role,"ok",`接收管理员任务：${text.slice(0,18)}…`]);
      CHANNEL[sid].push({from:role, text:`@产品经理 已接管理员新任务：${text.slice(0,24)}`, t:nowHM()});
      const ho=HANDOFF[role];
      if(ho){
        setTimeout(()=>{
          CHANNEL[sid].push({from:role, text:`@${ROLES[ho.to].label} ${ho.msg}`, t:nowHM()});
          CHAT[sid][ho.to].push({from:role, text:`【来自 ${ROLES[role].label}】${ho.msg}`, t:nowHM()});
          if(chatTarget && chatTarget.channel) renderChat();
          renderAll();
        },900);
      }
      renderAll(); toast(`已派任务 · ${ROLES[role].label} → 已联动 ${HANDOFF[role]?ROLES[HANDOFF[role].to].label:'团队频道'}`);
    }
  },600);
}
function hitReply(role,text){
  const m={pm:"收到，我来协调优先级与排期。",seo:"我评估下关键词影响面再反馈。",designer:"视觉这边可以配合，给我落地页范围。",
    dev:"代码这边没问题，我排进本次改动。",frontend:"前端可承接，注意响应式即可。",backend:"接口我来支持，确认下数据字段。",
    server:"部署我安排，先确认环境与额度。",reviewer:"我会在上线前做回归与合规检查。"};
  return m[role]||"收到。";
}

/* ---------- 真实接口接入 ---------- */
const API = {
  // Supabase 项目的 Edge Functions 地址
  base: "https://grogrigybgimvuuunxef.supabase.co/functions/v1",
  // 填入 Supabase anon key（publishable，可公开）；留空则保持演示数据
  key:  ""
};
function authHeaders(){ return API.key ? {apikey:API.key, Authorization:"Bearer "+API.key} : {}; }
function setSource(txt){ const n=document.getElementById("note"); if(n) n.textContent=txt; }
let chatsSeeded=false;

async function loadData(){
  try{
    const r = await fetch(`${API.base}/agent-status`, { headers: authHeaders() });
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    if(d && Array.isArray(d.sites) && d.sites.length){
      SITES = d.sites; LOGS = d.logs || {};
      setSource("● 实时接口数据 · 最后更新 "+new Date().toLocaleTimeString('zh-CN',{hour12:false})+"（每 30s 自动刷新）");
    } else {
      setSource("● 演示数据（接口暂无数据，已回退）");
    }
  }catch(e){
    setSource("● 演示数据（未连接接口：在 API.key 填入 anon key 并部署 agent-status 后自动切换为实时数据）");
  }
  if(!chatsSeeded){ seedChats(); chatsSeeded=true; }
  renderAll();
}
// best-effort 把管理员操作回传给接口（未配置 key 则静默跳过）
function report(action, payload){
  if(!API.key) return;
  fetch(`${API.base}/agent-status`, { method:"POST",
    headers:{...authHeaders(), "Content-Type":"application/json"},
    body: JSON.stringify({ action, ...payload }) }).catch(()=>{});
}

setInterval(tick,1000);tick();
loadData();
setInterval(loadData, 30000);
document.getElementById("modalBg").addEventListener("click",e=>{if(e.target.id==="modalBg")closeModal();});
</script>
