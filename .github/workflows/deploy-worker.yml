name: Deploy Worker
# DISABLED auto-trigger: Worker (seo-dashboard-api.homevirtavo.workers.dev) is superseded
# by Cloudflare Pages Functions (functions/api/[[path]].js) which handle all /api/* routes.
# Keep for manual re-deploy only if the standalone Worker is ever needed again.
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          secrets: |
            ADMIN_PASSWORD_HASH
        env:
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
